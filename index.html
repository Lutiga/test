<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟구구단 대탐험🌟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <h1>🚀 구구단 대탐험 🚀</h1>
            <p>우주 최고 천재가 되어볼까요?</p>
            <div class="level-selector" id="level-selector">
                <!-- Buttons 2 to 9 will be generated by JS -->
            </div>
            <button id="start-btn" class="jelly-btn primary-btn" disabled>도전 할 단을 선택하세요!</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar"></div>
                <div id="progress-text">1 / 10</div>
            </div>
            <div id="question-container">
                <span id="q-num1">2</span> <span class="op">✖️</span> <span id="q-num2">3</span> <span class="op">=</span> <span class="op">❓</span>
            </div>
            <div class="options-grid" id="options-grid">
                <!-- 4 Options generated by JS -->
                <button class="jelly-btn option-btn"></button>
                <button class="jelly-btn option-btn"></button>
                <button class="jelly-btn option-btn"></button>
                <button class="jelly-btn option-btn"></button>
            </div>
            <div id="feedback-emoji"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2>대탐험 결과! 🎉</h2>
            <div class="score-display">
                <span id="final-score">100</span>점
            </div>
            <p id="result-message">우주 최고 천재! 🚀</p>
            <div class="result-actions">
                <button id="retry-btn" class="jelly-btn action-btn">다시 하기 🔄</button>
                <button id="home-btn" class="jelly-btn action-btn">다른 단 선택 🏠</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
